# GPU override — merge with the base compose file to enable CUDA:
#
#   docker compose -f compose.yml -f compose.gpu.yml up
#
# Requires nvidia-container-toolkit on the host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Enables GPU access for:
#   brain-node — CUDA-accelerated Whisper inference
#   ollama     — GPU-accelerated LLM inference (Ollama auto-detects CUDA)

services:
  brain-node:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
