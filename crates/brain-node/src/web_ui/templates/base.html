<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aether{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <nav class="sidebar">
    <div class="logo">⚡ Aether</div>
    <ul>
      <li><a href="/ui/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a></li>
      <li><a href="/ui/nodes" class="{% if active == 'nodes' %}active{% endif %}">Nodes</a></li>
      <li><a href="/ui/documents" class="{% if active == 'documents' %}active{% endif %}">Documents</a></li>
      <li><a href="/ui/skills" class="{% if active == 'skills' %}active{% endif %}">Skills</a></li>
      <li class="section-label">Settings</li>
      <li><a href="/ui/settings/tts" class="{% if active == 'settings_tts' %}active{% endif %}">TTS</a></li>
      <li><a href="/ui/settings/models" class="{% if active == 'settings_models' %}active{% endif %}">Models</a></li>
      <li class="section-label">Training</li>
      <li><a href="/ui/training/wake-word" class="{% if active == 'training_wakeword' %}active{% endif %}">Wake Word</a></li>
      <li><a href="/ui/training/voice" class="{% if active == 'training_voice' %}active{% endif %}">Voice</a></li>
    </ul>
  </nav>
  <main class="content">
    <div class="page-header">
      <h1>{% block heading %}{% endblock %}</h1>
      <div class="header-actions">{% block header_actions %}{% endblock %}</div>
    </div>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
